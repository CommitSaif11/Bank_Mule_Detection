services:
  # Backend — Docker web service
  - type: web
    name: mulenet-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"

  # Frontend — static site
  - type: web
    name: mulenet-dashboard
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://mulenet-api.onrender.com
